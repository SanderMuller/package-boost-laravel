name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Wire sibling checkouts as path repositories
        run: |
          composer config repositories.boost-core '{"type":"path","url":"../boost-core","options":{"versions":{"sandermuller/boost-core":"1.0.x-dev"}}}'
          composer config repositories.package-boost-php '{"type":"path","url":"../package-boost-php","options":{"versions":{"sandermuller/package-boost-php":"1.0.x-dev"}}}'
          composer config minimum-stability dev
          composer config prefer-stable true

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run CI
        run: composer ci
