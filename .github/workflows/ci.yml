name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4
        with:
          path: package-boost-laravel

      - name: Checkout boost-core sibling
        uses: actions/checkout@v4
        with:
          repository: SanderMuller/boost-core
          path: boost-core
          ref: main

      - name: Checkout package-boost-php sibling
        uses: actions/checkout@v4
        with:
          repository: SanderMuller/package-boost-php
          path: package-boost-php
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        working-directory: package-boost-laravel
        run: composer install --prefer-dist --no-progress

      - name: Run CI
        working-directory: package-boost-laravel
        run: composer ci
