name: update-changelog

on:
  release:
    types: [released]

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.release.tag_name }}
          release-notes: ${{ github.event.release.body }}

      # changelog-updater-action inserts the new `## [x.y.z]` section but
      # leaves `## [Unreleased]` untouched, so dev-time entries accumulate
      # there and duplicate the release section. Drop everything between the
      # Unreleased heading and the next version heading.
      - name: Clear Unreleased section
        run: |
          awk '
            /^## \[Unreleased\]/ { print; print ""; skip = 1; next }
            skip && /^## \[/     { skip = 0 }
            skip                 { next }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.event.release.target_commitish }}
          commit_message: Update CHANGELOG
          file_pattern: CHANGELOG.md
